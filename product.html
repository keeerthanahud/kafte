<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product | KAFTÉ</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Playfair Display', serif;
    background:#F2EDE5;
    color:#0D1B2A;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:60px 20px;
}

.product-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:60px;
}

.product-image img{
    width:100%;
    height:600px;
    object-fit:cover;
}

.product-info h1{
    letter-spacing:4px;
    margin-bottom:20px;
}

.price{
    font-size:20px;
    margin-bottom:30px;
}

.sizes{
    margin-bottom:30px;
}

.sizes button{
    padding:10px 20px;
    border:1px solid #0D1B2A;
    background:none;
    cursor:pointer;
    margin-right:10px;
}

.sizes button.active{
    background:#0D1B2A;
    color:white;
}

.description{
    margin-bottom:30px;
    line-height:1.6;
}

.add-to-cart{
    padding:14px 40px;
    background:#0D1B2A;
    color:white;
    border:none;
    cursor:pointer;
    letter-spacing:2px;
}

@media(max-width:900px){
    .product-grid{
        grid-template-columns:1fr;
    }

    .product-image img{
        height:400px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="product-grid">

<div class="product-image">
    <img src="images/bluetee.jpg" id="product-img">
</div>

<div class="product-info">

<h1 id="product-name">BEIGE OVERSIZED TEE</h1>
<div class="price" id="product-price">₹1299</div>

<div class="sizes">
    <p>Select Size:</p>
    <button onclick="selectSize(this)">S</button>
    <button onclick="selectSize(this)">M</button>
    <button onclick="selectSize(this)">L</button>
    <button onclick="selectSize(this)">XL</button>
</div>

<div class="description">
Premium oversized cotton tee crafted for minimal everyday luxury.
Soft fabric. Relaxed fit. Timeless silhouette.
</div>

<button class="add-to-cart" onclick="addToCart()">ADD TO CART</button>

</div>

</div>

</div>

<script>

let selectedSize = null;

function selectSize(btn){
    document.querySelectorAll(".sizes button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    selectedSize = btn.innerText;
}

function addToCart(){

    if(!selectedSize){
        alert("Please select a size.");
        return;
    }

    let cart = JSON.parse(localStorage.getItem("kafteCart")) || [];

    const product = {
        name: document.getElementById("product-name").innerText,
        price: 1299,
        quantity: 1,
        size: selectedSize,
        image: "images/bluetee.jpg"
    };

    cart.push(product);

    localStorage.setItem("kafteCart", JSON.stringify(cart));

    alert("Added to cart successfully!");
}

</script>

</body>
</html>
