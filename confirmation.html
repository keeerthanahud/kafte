<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmation | KAFTÉ</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Playfair Display', serif;
    background:#F2EDE5;
    padding:40px 20px;
    color:#0D1B2A;
}

.email-box{
    max-width:700px;
    margin:auto;
    background:white;
    padding:40px;
}

h1{
    letter-spacing:4px;
    margin-bottom:20px;
}

.order-id{
    font-size:14px;
    margin-bottom:30px;
    color:gray;
}

.summary-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.total{
    margin-top:20px;
    font-weight:bold;
    font-size:18px;
}

.gpay-box{
    margin-top:40px;
    padding:20px;
    background:#F8F8F8;
}

button{
    margin-top:30px;
    padding:12px 30px;
    background:#0D1B2A;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="email-box">

<h1>KAFTÉ</h1>
<p>Thank you for your order.</p>

<div class="order-id">
Order ID: <span id="order-id"></span>
</div>

<div id="order-summary"></div>

<div class="total">
Total Amount: ₹<span id="final-total"></span>
</div>

<div class="gpay-box">
<strong>Payment Method: Google Pay (GPay)</strong>
<p>Please send the exact amount to the UPI ID below:</p>
<p><strong>keerthanamb736-2@okicici</strong></p>
<p>After payment, send screenshot to our Instagram DM.</p>
</div>

<button onclick="goHome()">Back to Home</button>

</div>

<script>

let order = JSON.parse(localStorage.getItem("kafteLastOrder"));

if(order){
    document.getElementById("order-id").innerText = order.id;
    document.getElementById("final-total").innerText = order.total;

    order.items.forEach(item => {
        document.getElementById("order-summary").innerHTML += `
            <div class="summary-item">
                <span>${item.name} x ${item.quantity}</span>
                <span>₹${item.price * item.quantity}</span>
            </div>
        `;
    });
}

function goHome(){
    window.location.href = "index.html";
}

</script>

</body>
</html>
